# Mendefinisikan zona pembatasan (Maksimal 90 request per menit per IP)
limit_req_zone $binary_remote_addr zone=one:10m rate=90r/m;

# =========================================================================
# 1. SERVER HTTP (PORT 80) -> REDIRECT TO HTTPS
# =========================================================================
server {
    listen 80;
    listen [::]:80;
    server_name 54.205.236.236.nip.io;
    
    return 301 https://$host$request_uri;
}

# =========================================================================
# 2. SERVER HTTPS (PORT 443)
# =========================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 54.205.236.236.nip.io;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/54.205.236.236.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/54.205.236.236.nip.io/privkey.pem;

    # Optimasi SSL (Opsional tapi bikin nilai Plus)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # =========================================================================
    # Route Umum (Tanpa Rate Limiting)
    # =========================================================================
    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Teruskan IP asli user agar aplikasi tahu siapa yang me-request
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================================================
    # Route Khusus /threads (Dengan Rate Limiting Aktif)
    # =========================================================================
    location /threads {
        # Mengaktifkan pembatasan dengan toleransi antrean (burst) sebanyak 10 request
        limit_req zone=one burst=10 nodelay;
        
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Teruskan IP asli user (Wajib agar $binary_remote_addr bekerja akurat)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}